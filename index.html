<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🦕 Dino Learning Hub</title>
<style>
/* ===== GOOGLE FONTS FALLBACK + SYSTEM ===== */
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

:root {
  --green: #3B6D11;
  --green-light: #EAF3DE;
  --green-mid: #639922;
  --amber: #BA7517;
  --amber-light: #FAEEDA;
  --coral: #993C1D;
  --coral-light: #FAECE7;
  --purple: #534AB7;
  --purple-light: #EEEDFE;
  --teal: #0F6E56;
  --teal-light: #E1F5EE;
  --bg: #f7f9f4;
  --card: #ffffff;
  --border: #e4e8df;
  --text: #1a2212;
  --text-muted: #6b7c5a;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 2px 12px rgba(59,109,17,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ===== HEADER ===== */
.site-header {
  background: linear-gradient(135deg, #2d5a0e 0%, #3B6D11 50%, #4a8a15 100%);
  padding: 1.5rem 1rem 1rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.site-header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='30' cy='30' r='4'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}
.site-header h1 {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1.8rem, 5vw, 3rem);
  color: white;
  letter-spacing: 2px;
  position: relative;
  text-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.site-header p {
  color: rgba(255,255,255,0.85);
  font-size: clamp(13px, 2.5vw, 16px);
  margin-top: 6px;
  position: relative;
  font-weight: 600;
}
.dino-strip {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 10px;
  font-size: 1.8rem;
  position: relative;
  opacity: 0.7;
}

/* ===== TABS ===== */
.tabs-wrapper {
  background: white;
  border-bottom: 2px solid var(--border);
  padding: 0.75rem 1rem;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 700px;
  margin: 0 auto;
}
.tab {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(13px, 2.5vw, 15px);
  padding: 8px 18px;
  border-radius: 30px;
  border: 2.5px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--bg);
  color: var(--text-muted);
  font-weight: 400;
}
.tab:hover { transform: scale(1.05); }
.tab.active { color: white; transform: scale(1.06); box-shadow: 0 3px 10px rgba(0,0,0,0.15); }
.tab[data-cat="letters"].active { background: var(--purple); border-color: var(--purple); }
.tab[data-cat="numbers"].active { background: var(--green); border-color: var(--green); }
.tab[data-cat="puzzles"].active { background: var(--amber); border-color: var(--amber); }
.tab[data-cat="art"].active { background: var(--coral); border-color: var(--coral); }

/* ===== MAIN CONTENT ===== */
.main {
  max-width: 760px;
  margin: 0 auto;
  padding: 1.5rem 1rem 3rem;
}

.generator-card {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem;
  box-shadow: var(--shadow);
}

.gen-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 1.25rem;
  padding-bottom: 1rem;
  border-bottom: 1.5px solid var(--border);
}
.gen-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.gen-title {
  font-family: 'Fredoka One', cursive;
  font-size: 1.25rem;
}
.gen-desc { font-size: 13px; color: var(--text-muted); margin-top: 2px; }

.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-bottom: 1.25rem;
  align-items: flex-end;
}
.control-group { display: flex; flex-direction: column; gap: 5px; }
.control-group label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
select {
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 600;
  padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  cursor: pointer;
  outline: none;
}
select:focus { border-color: var(--green); }

.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

.generate-btn {
  font-family: 'Fredoka One', cursive;
  font-size: 15px;
  padding: 10px 22px;
  border-radius: 30px;
  border: none;
  cursor: pointer;
  color: white;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 3px 10px rgba(0,0,0,0.15);
}
.generate-btn:hover { transform: scale(1.04) translateY(-1px); box-shadow: 0 5px 14px rgba(0,0,0,0.2); }
.generate-btn:active { transform: scale(0.97); }
.letters-btn { background: linear-gradient(135deg, #534AB7, #7F77DD); }
.numbers-btn { background: linear-gradient(135deg, #3B6D11, #639922); }
.puzzles-btn { background: linear-gradient(135deg, #BA7517, #EF9F27); }
.art-btn { background: linear-gradient(135deg, #993C1D, #D85A30); }

.print-btn {
  font-family: 'Fredoka One', cursive;
  font-size: 14px;
  padding: 10px 18px;
  border-radius: 30px;
  background: white;
  border: 2px solid var(--border);
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.15s;
}
.print-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }

/* ===== PREVIEW AREA ===== */
.preview-label {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.preview-area {
  border: 2px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 1.25rem;
  min-height: 300px;
  background: #fafafa;
  transition: border-color 0.2s;
}
.preview-area.has-content {
  background: white;
  border-color: var(--green-mid);
  border-style: solid;
}
.placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 250px;
  gap: 10px;
  color: #ccc;
}
.placeholder .big-emoji { font-size: 3rem; opacity: 0.3; }
.placeholder p { font-size: 14px; font-weight: 600; }

/* ===== SHEET STYLES (visible in preview + print) ===== */
.sheet { font-family: 'Nunito', sans-serif; }
.sheet-title {
  font-family: 'Fredoka One', cursive;
  font-size: 1.4rem;
  color: var(--green);
  text-align: center;
  margin-bottom: 4px;
}
.sheet-sub {
  font-size: 13px;
  color: var(--text-muted);
  text-align: center;
  margin-bottom: 1rem;
}
.trace-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
@media (max-width: 480px) { .trace-grid { grid-template-columns: repeat(2, 1fr); } }
.trace-box {
  border: 1.5px solid #ddd;
  border-radius: 10px;
  padding: 10px 8px;
  text-align: center;
  background: white;
}
.big-letter {
  font-size: 2.8rem;
  font-weight: 800;
  color: #e8e8e8;
  font-family: 'Fredoka One', cursive;
  line-height: 1;
}
.trace-line { border-bottom: 1.5px dashed #ccc; height: 34px; margin-top: 6px; }
.math-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.math-box {
  border: 1.5px solid #eee;
  border-radius: 10px;
  padding: 10px 14px;
  background: white;
}
.math-q { font-size: 1.25rem; font-weight: 800; color: var(--green); }
.ans-line { border-bottom: 1.5px solid #ddd; width: 48px; height: 26px; margin-top: 6px; }

/* ===== FOOTER ===== */
.site-footer {
  text-align: center;
  padding: 1.5rem 1rem;
  color: var(--text-muted);
  font-size: 13px;
  border-top: 1.5px solid var(--border);
  background: white;
}

/* ===== PRINT STYLES ===== */
@media print {
  body { background: white !important; }
  .site-header, .tabs-wrapper, .controls, .btn-row,
  .preview-label, .gen-header, .site-footer { display: none !important; }
  .main { padding: 0; max-width: 100%; }
  .generator-card { border: none; box-shadow: none; padding: 0; }
  .preview-area { border: none; padding: 0; background: white; }
  .sheet-title { color: #3B6D11 !important; }
  .trace-box, .math-box { border-color: #ccc !important; }
  .big-letter { color: #ddd !important; }
  .trace-line, .ans-line { border-color: #bbb !important; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <h1>🦕 Dino Learning Hub</h1>
  <p>Fun printable activities for curious young explorers!</p>
  <div class="dino-strip">🦕 🦖 🦕 🦖 🦕</div>
</header>

<!-- TABS -->
<div class="tabs-wrapper">
  <div class="tabs">
    <button class="tab active" data-cat="letters" onclick="switchTab('letters')">🔤 Letters</button>
    <button class="tab" data-cat="numbers" onclick="switchTab('numbers')">🔢 Numbers</button>
    <button class="tab" data-cat="puzzles" onclick="switchTab('puzzles')">🧩 Puzzles</button>
    <button class="tab" data-cat="art" onclick="switchTab('art')">🎨 Art</button>
  </div>
</div>

<!-- MAIN -->
<main class="main">
  <div id="activity-area"></div>
</main>

<!-- FOOTER -->
<footer class="site-footer">
  Made with 💚 for a curious little dino explorer &nbsp;|&nbsp; Print any sheet using the 🖨 button
</footer>

<script>
// =====================================================
// DATA
// =====================================================
const DINOS = ['T-Rex','Raptor','Triceratops','Stegosaurus','Brachiosaurus',
               'Pterodactyl','Ankylosaurus','Diplodocus','Spinosaurus','Iguanodon'];
const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
const DINO_WORDS = ['rex','egg','horn','tail','dino','claw','bone','nest','fang','roar','foot','skin','fire','herd'];
const DINO_FACTS = [
  'T-Rex had tiny arms but massive jaws!',
  'Triceratops had 3 horns on its face.',
  'Stegosaurus had plates on its back.',
  'Brachiosaurus ate leaves from tall trees.',
  'Pterodactyl could fly through the sky!',
];

let currentTab = 'letters';

// =====================================================
// TAB SWITCHING
// =====================================================
function switchTab(cat) {
  currentTab = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
  render();
}

function render() {
  const area = document.getElementById('activity-area');
  if (currentTab === 'letters') area.innerHTML = buildLettersUI();
  else if (currentTab === 'numbers') area.innerHTML = buildNumbersUI();
  else if (currentTab === 'puzzles') area.innerHTML = buildPuzzlesUI();
  else area.innerHTML = buildArtUI();
}

function placeholder() {
  return `<div class="placeholder"><div class="big-emoji">🦕</div><p>Click "Generate!" to create your sheet</p></div>`;
}

// =====================================================
// LETTERS
// =====================================================
function buildLettersUI() {
  return `<div class="generator-card">
    <div class="gen-header">
      <div class="gen-icon" style="background:#EEEDFE">🔤</div>
      <div><div class="gen-title" style="color:#534AB7">Letters &amp; Reading</div>
      <div class="gen-desc">Tracing, missing letters, matching &amp; more</div></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Activity</label>
        <select id="letter-type">
          <option value="trace">Trace the letters</option>
          <option value="missing">Fill the missing letter</option>
          <option value="match">Letter &amp; dino match</option>
          <option value="word">Spell the dino word</option>
        </select>
      </div>
      <div class="control-group">
        <label>Letter set</label>
        <select id="letter-set">
          <option value="random">Random 8</option>
          <option value="af">A – F</option>
          <option value="gm">G – M</option>
          <option value="ns">N – S</option>
          <option value="tz">T – Z</option>
          <option value="vowels">Vowels (A E I O U)</option>
        </select>
      </div>
    </div>
    <div class="btn-row" style="margin-bottom:1.25rem">
      <button class="generate-btn letters-btn" onclick="generateLetters()">🦕 Generate!</button>
      <button class="print-btn" onclick="printSheet('letters-preview')">🖨 Print / Save PDF</button>
    </div>
    <div class="preview-label">Preview</div>
    <div class="preview-area" id="letters-preview">${placeholder()}</div>
  </div>`;
}

function getLetterSet() {
  const s = document.getElementById('letter-set').value;
  if (s === 'af') return ALPHABET.slice(0,6);
  if (s === 'gm') return ALPHABET.slice(6,13);
  if (s === 'ns') return ALPHABET.slice(13,19);
  if (s === 'tz') return ALPHABET.slice(19,26);
  if (s === 'vowels') return ['A','E','I','O','U'];
  return [...ALPHABET].sort(() => Math.random()-0.5).slice(0,8).sort();
}

function generateLetters() {
  const type = document.getElementById('letter-type').value;
  const letters = getLetterSet();
  let html = '';

  if (type === 'trace') {
    const pairs = letters.map((l,i) => ({letter:l, dino:DINOS[i % DINOS.length]}));
    html = `<div class="sheet-title">✏️ Trace the Letters!</div>
    <div class="sheet-sub">Trace the grey letter, then practise writing it on the lines below</div>
    <div class="trace-grid">` +
    pairs.map(p => `<div class="trace-box">
      <div class="big-letter">${p.letter}</div>
      <div style="font-size:10px;color:#bbb;margin:3px 0">${p.dino.slice(0,8)}</div>
      <div class="trace-line"></div>
      <div class="trace-line"></div>
    </div>`).join('') + `</div>
    <div style="margin-top:14px;padding:10px 14px;background:#EAF3DE;border-radius:10px;font-size:13px;color:#3B6D11;font-weight:600">
      🦕 Did you know? ${DINO_FACTS[Math.floor(Math.random()*DINO_FACTS.length)]}
    </div>`;

  } else if (type === 'missing') {
    const words = [...DINO_WORDS].sort(() => Math.random()-0.5).slice(0,8);
    html = `<div class="sheet-title">🔍 Missing Letters!</div>
    <div class="sheet-sub">Write the missing letter in each dino word</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px">` +
    words.map(w => {
      const hide = Math.floor(Math.random() * w.length);
      const disp = w.toUpperCase().split('').map((c,i) =>
        i===hide
          ? `<span style="display:inline-block;border-bottom:2.5px solid #534AB7;width:22px;min-height:22px;">&nbsp;</span>`
          : `<span style="font-weight:800;color:#222">${c}</span>`
      ).join('<span style="display:inline-block;width:5px"></span>');
      return `<div class="math-box">
        <div style="font-size:1.15rem;letter-spacing:4px">${disp}</div>
        <div style="font-size:11px;color:#bbb;margin-top:6px">_ _ _ _ _ _ _</div>
      </div>`;
    }).join('') + `</div>`;

  } else if (type === 'match') {
    const left = letters.slice(0,5);
    const right = [...DINOS].filter(d => left.some(l => d.toUpperCase().startsWith(l)));
    while(right.length < 5) right.push(DINOS[right.length]);
    const shuffled = [...right].sort(() => Math.random()-0.5).slice(0,5);
    html = `<div class="sheet-title">🔗 Match It!</div>
    <div class="sheet-sub">Draw a line from each letter to the dino that starts with it</div>
    <div style="display:flex;justify-content:space-between;gap:16px;margin-top:14px;align-items:flex-start">
      <div style="display:flex;flex-direction:column;gap:16px;">` +
      left.map(l => `<div style="width:42px;height:42px;border-radius:50%;background:#EEEDFE;border:2px solid #AFA9EC;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.2rem;color:#534AB7">${l}</div>`).join('') +
      `</div><div style="flex:1;border-left:2px dashed #e0e0e0;margin:0 8px"></div>
      <div style="display:flex;flex-direction:column;gap:16px;text-align:right">` +
      shuffled.map(d => `<div style="padding:8px 14px;background:#EAF3DE;border-radius:20px;font-size:13px;font-weight:700;color:#3B6D11;">${d}</div>`).join('') +
      `</div></div>`;

  } else {
    // Spell the dino word
    const words2 = [...DINO_WORDS].sort(() => Math.random()-0.5).slice(0,6);
    html = `<div class="sheet-title">🦕 Spell the Dino Word!</div>
    <div class="sheet-sub">Unjumble the letters to spell each word. Write your answer below!</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px">` +
    words2.map(w => {
      const jumbled = w.toUpperCase().split('').sort(() => Math.random()-0.5).join(' ');
      return `<div class="math-box">
        <div style="font-size:1.1rem;font-weight:800;color:#534AB7;letter-spacing:6px">${jumbled}</div>
        <div style="font-size:11px;color:#bbb;margin-top:4px">${w.length} letters</div>
        <div class="ans-line" style="width:100%;margin-top:8px"></div>
      </div>`;
    }).join('') + `</div>`;
  }

  const el = document.getElementById('letters-preview');
  el.innerHTML = `<div class="sheet">${html}</div>`;
  el.classList.add('has-content');
}

// =====================================================
// NUMBERS
// =====================================================
function buildNumbersUI() {
  return `<div class="generator-card">
    <div class="gen-header">
      <div class="gen-icon" style="background:#EAF3DE">🔢</div>
      <div><div class="gen-title" style="color:#3B6D11">Numbers &amp; Maths</div>
      <div class="gen-desc">Addition, counting, ordering, subtraction &amp; more</div></div>
    </div>
    <div class="controls">
      <div class="control-group">
        <label>Activity</label>
        <select id="num-type">
          <option value="add">Dino addition</option>
          <option value="sub">Subtraction</option>
          <option value="count">Count the dinos</option>
          <option value="order">Number ordering</option>
          <option value="bonds">Number bonds</option>
          <option value="bigger">Bigger or smaller?</option>
        </select>
      </div>
      <div class="control-group">
        <label>Max number</label>
        <select id="num-max">
          <option value="5">Up to 5</option>
          <option value="10" selected>Up to 10</option>
          <option value="20">Up to 20</option>
          <option value="50">Up to 50</option>
        </select>
      </div>
      <div class="control-group">
        <label>Questions</label>
        <select id="num-count">
          <option value="6">6 questions</option>
          <option value="8" selected>8 questions</option>
          <option value="12">12 questions</option>
        </select>
      </div>
    </div>
    <div class="btn-row" style="margin-bottom:1.25rem">
      <button class="generate-btn numbers-btn" onclick="generateNumbers()">🦕 Generate!</button>
      <button class="print-btn" onclick="printSheet('numbers-preview')">🖨 Print / Save PDF</button>
    </div>
    <div class="preview-label">Preview</div>
    <div class="preview-area" id="numbers-preview">${placeholder()}</div>
  </div>`;
}

function generateNumbers() {
  const type = document.getElementById('num-type').value;
  const max = parseInt(document.getElementById('num-max').value);
  const count = parseInt(document.getElementById('num-count').value);
  let html = '';

  if (type === 'add') {
    const half = Math.max(2, Math.floor(max/2));
    const qs = Array.from({length:count}, () => {
      const a = Math.floor(Math.random()*half)+1;
      const b = Math.floor(Math.random()*Math.min(half, max-a))+1;
      return {a, b};
    });
    html = `<div class="sheet-title">🦕 Dino Addition!</div>
    <div class="sheet-sub">Add the numbers and write your answer. Count the dinos to help!</div>
    <div class="math-grid">` +
    qs.map(q => `<div class="math-box">
      <div class="math-q">${q.a} + ${q.b} = ___</div>
      <div style="font-size:1rem;margin-top:6px;letter-spacing:2px">${'🦕'.repeat(Math.min(q.a,5))} <span style="color:#ccc">+</span> ${'🦖'.repeat(Math.min(q.b,5))}</div>
    </div>`).join('') + `</div>`;

  } else if (type === 'sub') {
    const qs = Array.from({length:count}, () => {
      const b = Math.floor(Math.random()*(max-1))+1;
      const a = Math.min(max, b + Math.floor(Math.random()*(max-b))+1);
      return {a, b};
    });
    html = `<div class="sheet-title">🦖 Dino Subtraction!</div>
    <div class="sheet-sub">Some dinos ran away! How many are left?</div>
    <div class="math-grid">` +
    qs.map(q => `<div class="math-box">
      <div class="math-q">${q.a} − ${q.b} = ___</div>
      <div style="font-size:11px;color:#aaa;margin-top:5px">${q.a} dinos, ${q.b} run away...</div>
    </div>`).join('') + `</div>`;

  } else if (type === 'count') {
    const qs = Array.from({length:count}, () => Math.floor(Math.random()*max)+1);
    const emojis = ['🦕','🦖','🥚','🦴','🌿'];
    html = `<div class="sheet-title">🔢 Count the Dinos!</div>
    <div class="sheet-sub">Count each group carefully and write the number in the box</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px">` +
    qs.map(n => {
      const e = emojis[Math.floor(Math.random()*emojis.length)];
      return `<div class="math-box" style="text-align:center">
        <div style="font-size:1.3rem;line-height:1.8;min-height:52px;word-break:break-all">${e.repeat(n)}</div>
        <div style="display:inline-block;border:2px solid #eee;border-radius:8px;width:44px;height:34px;margin-top:8px"></div>
      </div>`;
    }).join('') + `</div>`;

  } else if (type === 'order') {
    const rows = Array.from({length:Math.min(count,5)}, () => {
      const set = new Set();
      while(set.size < 5) set.add(Math.floor(Math.random()*max)+1);
      return [...set].sort(() => Math.random()-0.5);
    });
    html = `<div class="sheet-title">🦕 Number Order!</div>
    <div class="sheet-sub">Write the numbers smallest → biggest in the boxes</div>
    <div style="display:flex;flex-direction:column;gap:14px;margin-top:8px">` +
    rows.map(r => `<div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:6px">
        ${r.map(n=>`<div style="min-width:36px;height:36px;border-radius:8px;background:#EAF3DE;display:flex;align-items:center;justify-content:center;font-weight:800;color:#3B6D11;font-size:1rem;padding:0 6px">${n}</div>`).join('')}
      </div>
      <div style="display:flex;gap:6px;align-items:center">
        <span style="font-size:11px;color:#aaa;margin-right:4px">Answer:</span>
        ${r.map(()=>`<div style="min-width:36px;height:36px;border-radius:8px;border:1.5px solid #ddd"></div>`).join('')}
      </div>
    </div>`).join('') + `</div>`;

  } else if (type === 'bonds') {
    const target = Math.min(max, 10);
    const qs = Array.from({length:count}, () => {
      const a = Math.floor(Math.random()*(target+1));
      return {a, b:target-a, target};
    });
    html = `<div class="sheet-title">💚 Number Bonds to ${target}!</div>
    <div class="sheet-sub">Fill in the missing number so each pair adds up to ${target}</div>
    <div class="math-grid">` +
    qs.map(q => `<div class="math-box">
      <div class="math-q">${q.a} + ___ = ${q.target}</div>
    </div>`).join('') + `</div>`;

  } else {
    // bigger or smaller
    const qs = Array.from({length:count}, () => {
      const a = Math.floor(Math.random()*max)+1;
      let b = Math.floor(Math.random()*max)+1;
      while(b === a) b = Math.floor(Math.random()*max)+1;
      return {a, b};
    });
    html = `<div class="sheet-title">🦖 Bigger or Smaller?</div>
    <div class="sheet-sub">Write &gt; (bigger) or &lt; (smaller) in the middle box</div>
    <div class="math-grid">` +
    qs.map(q => `<div class="math-box" style="display:flex;align-items:center;gap:10px">
      <div style="font-size:1.3rem;font-weight:800;color:#3B6D11;min-width:28px;text-align:center">${q.a}</div>
      <div style="width:32px;height:32px;border:2px solid #ddd;border-radius:8px"></div>
      <div style="font-size:1.3rem;font-weight:800;color:#3B6D11;min-width:28px;text-align:center">${q.b}</div>
    </div>`).join('') + `</div>`;
  }

  const el = document.getElementById('numbers-preview');
  el.innerHTML = `<div class="sheet">${html}</div>`;
  el.classList.add('has-content');
}

function buildWordSearch() {
  const words = [...DINO_WORDS].sort(() => Math.random()-0.5).slice(0,5);
  const size = 8;
  const grid = Array.from({length:size}, () => Array(size).fill(''));
  words.forEach(w => {
    const wUp = w.toUpperCase();
    for(let t=0;t<60;t++){
      const horiz = Math.random()>0.5;
      const row = Math.floor(Math.random()*(horiz ? size : size-wUp.length));
      const col = Math.floor(Math.random()*(horiz ? size-wUp.length : size));
      let ok = true;
      for(let i=0;i<wUp.length&&ok;i++){
        const r2=horiz?row:row+i, c2=horiz?col+i:col;
        if(grid[r2][c2] && grid[r2][c2]!==wUp[i]) ok=false;
      }
      if(ok){
        for(let i=0;i<wUp.length;i++){
          const r2=horiz?row:row+i, c2=horiz?col+i:col;
          grid[r2][c2]=wUp[i];
        }
        break;
      }
    }
  });
  const letters='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for(let r=0;r<size;r++) for(let c=0;c<size;c++) if(!grid[r][c]) grid[r][c]=letters[Math.floor(Math.random()*26)];

  return `<div class="sheet-title">🔍 Dino Word Search!</div>
  <div class="sheet-sub">Find these words: <strong>${words.map(w=>w.toUpperCase()).join(', ')}</strong></div>
  <div style="display:inline-block;border:2px solid #eee;border-radius:10px;overflow:hidden;margin:10px 0">` +
  grid.map(row=>`<div style="display:flex">`+
    row.map(c=>`<div style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#333;border:0.5px solid #f2f2f2">${c}</div>`).join('')
  +`</div>`).join('') + `</div>
  <div style="margin-top:10px;font-size:12px;color:#aaa">Words can be across ➡️ or down ⬇️</div>`;
}

function buildMaze() {
  const mazeData = [
    "S.XXXXX",
    "..X...X",
    "X.X.X.X",
    "X...X..",
    "XXXXX.X",
    "X.....X",
    "X.XXXXX",
    "X.....E"
  ];
  const rows=mazeData.length, cols=mazeData[0].length;
  const cs=38;
  let svg=`<svg viewBox="0 0 ${cols*cs+20} ${rows*cs+24}" width="100%" style="display:block;max-width:320px;margin:0 auto">`;
  svg+=`<rect x="10" y="10" width="${cols*cs}" height="${rows*cs}" fill="#f9fdf4" stroke="#c8ddb0" stroke-width="1.5" rx="6"/>`;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const ch=mazeData[r][c];
      const x=10+c*cs, y=10+r*cs;
      if(ch==='X') svg+=`<rect x="${x+1}" y="${y+1}" width="${cs-2}" height="${cs-2}" fill="#8fbc5a" rx="3"/>`;
      else if(ch==='S') svg+=`<text x="${x+cs/2}" y="${y+cs/2+6}" text-anchor="middle" font-size="20">🦖</text>`;
      else if(ch==='E') svg+=`<text x="${x+cs/2}" y="${y+cs/2+6}" text-anchor="middle" font-size="20">🥚</text>`;
      svg+=`<rect x="${x}" y="${y}" width="${cs}" height="${cs}" fill="none" stroke="#e0ecd0" stroke-width="0.5"/>`;
    }
  }
  svg+=`</svg>`;
  return `<div class="sheet-title">🌿 Help the Dino Find the Egg!</div>
  <div class="sheet-sub">Draw the path through the maze. Avoid the green walls!</div>
  <div style="margin-top:8px">${svg}</div>
  <div style="display:flex;gap:12px;margin-top:10px;font-size:12px;color:#888">
    <span>🦖 = Start</span><span>🥚 = Finish</span><span style="display:flex;align-items:center;gap:4px"><span style="display:inline-block;width:14px;height:14px;background:#8fbc5a;border-radius:3px"></span>= Wall</span>
  </div>`;
}

  dotSvg+=`</svg>`;
  const ideas = ['a volcano','a jungle','a flying pterodactyl','a dino eating leaves','a dino nest with eggs','your favourite dinosaur'];
  const idea = ideas[Math.floor(Math.random()*ideas.length)];
  return `<div class="sheet-title">🦕 Dot Grid Drawing!</div>
  <div class="sheet-sub">Connect the dots to make your own picture! Try drawing: <strong>${idea}</strong></div>
  ${dotSvg}
  <div style="margin-top:10px;padding:8px 12px;background:#EAF3DE;border-radius:10px;font-size:12px;color:#3B6D11;font-weight:600;text-align:center">
    Tip: Start simple — draw straight lines between dots, then add details!
  </div>`;
}

function printSheet(previewId) {
  const preview = document.getElementById(previewId);
  if (!preview || !preview.classList.contains('has-content')) {
    alert('Please click "Generate!" first to create your activity sheet!');
    return;
  }
  const content = preview.innerHTML;
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dino Activity Sheet</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
:root{--green:#3B6D11;--amber:#BA7517;--coral:#993C1D;--purple:#534AB7;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito','Segoe UI',sans-serif;padding:24px 28px;max-width:680px;margin:0 auto;background:white;color:#1a2212}
.sheet-title{font-family:'Fredoka One',cursive;font-size:1.6rem;color:#3B6D11;text-align:center;margin-bottom:4px}
.sheet-sub{font-size:13px;color:#888;text-align:center;margin-bottom:1rem}
.trace-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.trace-box{border:1.5px solid #ddd;border-radius:10px;padding:10px 8px;text-align:center}
.big-letter{font-size:2.8rem;font-weight:800;color:#e8e8e8;font-family:'Fredoka One',cursive;line-height:1}
.trace-line{border-bottom:1.5px dashed #ccc;height:34px;margin-top:6px}
.math-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.math-box{border:1.5px solid #eee;border-radius:10px;padding:10px 14px}
.math-q{font-size:1.2rem;font-weight:800;color:#3B6D11}
.ans-line{border-bottom:1.5px solid #ddd;width:48px;height:26px;margin-top:6px}
.placeholder{display:none}
@media print{
  body{padding:10px}
  @page{margin:10mm;size:A4}
}
</style>
</head>
<body>${content}</body>
</html>`);
  w.document.close();
  w.focus();
  setTimeout(() => { w.print(); }, 700);
}
